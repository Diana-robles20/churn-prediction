# El usuario puede seleccionar entre
# 'LogisticRegression' o 'SVM'

select_model: 'LogisticRegression'

paths:
  model_path: 'models/model.pkl'
  data_path: 'data/raw/WA_Fn-UseC_-Telco-Customer-Churn.csv'

data:
  test_size: 0.2
  random_state: 42

rf_params:
  n_estimators: 100

lr_params:
  max_iter: 1000

svm_params:
  kernel: 'linear'